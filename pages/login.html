<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - Fica Bem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="app-body" data-page="login">
  <div class="phone-device" aria-label="Simulador de aplicativo mobile">
    <div class="phone-notch" aria-hidden="true"></div>
    <div class="phone-screen">
      <div class="phone-screen-inner text-white h-full w-full flex flex-col relative overflow-hidden">
          <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
              <div class="absolute top-[-10%] left-[-20%] w-[140%] h-[60%] bg-gradient-to-b from-brand-500/40 to-transparent rounded-[100%] blur-3xl opacity-60"></div>
              <div class="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] bg-gradient-to-t from-brand-900/50 to-transparent rounded-[100%] blur-3xl opacity-80"></div>
          </div>

          <main id="auth-welcome" class="flex flex-col bg-[#2f6759] auth-welcome--no-nav">
              <header class="w-full flex items-center justify-between pt-10 pb-4 z-20 shrink-0">
                  <a href="../index.html" id="auth-back" aria-label="Voltar" class="w-10 h-10 rounded-full flex items-center justify-center bg-white/10 hover:bg-white/20 transition-colors backdrop-blur-md border border-white/10">
                      <i class="fa-solid fa-chevron-left text-white"></i>
                  </a>
                  <div class="font-medium text-lg tracking-wide text-white/90">
                      Fica <span class="italic font-light">Bem</span>
                  </div>
                  <div class="w-10" aria-hidden="true"></div>
              </header>

              <div class="content flex flex-col pb-6">
                  <div class="text-center mb-6">
                      <h1 class="text-[26px] font-semibold text-white tracking-tight mb-2">Acesse sua conta</h1>
                      <p class="text-[14px] text-white/70 max-w-[280px] mx-auto">
                          Entre com seu e-mail ou usuário para continuar com segurança.
                      </p>
                  </div>

                  <section id="panel-login" class="auth-panel mt-2" role="tabpanel">
                      <form id="form-login" class="space-y-4" novalidate>
                          <div class="space-y-1">
                              <label for="login-identifier" class="text-[13px] font-medium text-white/90 ml-1">E-mail ou usuário</label>
                              <input type="text" id="login-identifier" name="identifier" required autocomplete="username"
                                placeholder="voce@email.com ou usuario"
                                class="w-full h-12 px-4 rounded-[14px] glass-panel text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-brand-500 text-[15px]">
                          </div>
                          <div class="space-y-1">
                              <label for="login-password" class="text-[13px] font-medium text-white/90 ml-1">Senha</label>
                              <div class="password-field">
                                  <input type="password" id="login-password" name="password" required autocomplete="current-password"
                                    placeholder="Sua senha"
                                    class="password-field__input glass-panel text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-brand-500 text-[15px]">
                                  <button type="button" class="password-field__toggle auth-toggle-password" data-target="login-password" aria-label="Mostrar senha">
                                      <i class="fa-regular fa-eye-slash text-[18px]"></i>
                                  </button>
                              </div>
                          </div>
                          <p id="login-error" class="text-[13px] text-red-300 hidden" role="alert"></p>
                          <button type="submit" class="w-full h-[52px] bg-white text-brand-600 rounded-[14px] font-semibold text-[16px] shadow-[0_4px_14px_0_rgba(0,0,0,0.1)] hover:bg-brand-50 transition-colors flex items-center justify-center gap-2 active:scale-[0.98]">
                              Entrar no app
                              <i class="fa-solid fa-arrow-right text-[14px]"></i>
                          </button>
                      </form>
                  </section>

                  <p class="text-[11px] text-white/40 text-center mt-6">
                      Conta demo: mariana@ficabem.app / demo123
                  </p>
              </div>
          </main>
      </div>
    </div>
    <div class="phone-home-indicator" aria-hidden="true"></div>
  </div>
  <script src="../js/storage.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/app-core.js"></script>
  <script src="../js/pages/login.js"></script>
</body>
</html>
