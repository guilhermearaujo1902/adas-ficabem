<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorar - Fica Bem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="app-body" data-page="explorar">
  <div class="phone-device" aria-label="Simulador de aplicativo mobile">
    <div class="phone-notch" aria-hidden="true"></div>
    <div class="phone-screen">
      <div class="phone-screen-inner text-white h-full w-full flex flex-col relative overflow-hidden m-0 p-0">
      <!-- Background Elements -->
          <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
              <div class="absolute top-[-10%] left-[-20%] w-[140%] h-[60%] bg-gradient-to-b from-brand-500/40 to-transparent rounded-[100%] blur-3xl opacity-60"></div>
              <div class="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] bg-gradient-to-t from-brand-900/50 to-transparent rounded-[100%] blur-3xl opacity-80"></div>
          </div>
      
          <!-- Main Container (Mobile Constrained) -->
          <main id="auth-welcome" class="flex flex-col bg-[#2f6759]">
              
              <!-- Header / Search -->
              <header id="explorar-header" class="w-full pt-12 pb-4 z-20 shrink-0 bg-[#2f6759]/90 backdrop-blur-md border-b border-white/5">
                  <div class="flex items-center justify-between mb-6">
                      <div class="font-medium text-[22px] tracking-wide text-white/90">
                          Fica <span class="italic font-light">Bem</span>
                      </div>
                      <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center hover:bg-white/20 transition-colors relative" aria-label="Notificações">
                          <i class="fa-regular fa-bell text-[18px] text-white"></i>
                          <span class="absolute top-2 right-2.5 w-2 h-2 bg-brand-400 rounded-full border border-[#2f6759]"></span>
                      </button>
                  </div>
      
                  <!-- Search Bar -->
                  <div class="explorar-search glass-panel shadow-sm">
                      <i class="fa-solid fa-magnifying-glass explorar-search__icon" aria-hidden="true"></i>
                      <input
                        type="search"
                        placeholder="Buscar locais seguros..."
                        aria-label="Buscar locais seguros">
                      <button
                        type="button"
                        id="btn-filtro-avancado"
                        class="explorar-search__filter"
                        aria-label="Filtros avançados">
                          <i class="fa-solid fa-sliders text-[14px]"></i>
                      </button>
                  </div>
      
                  <!-- Filters -->
                  <div id="explorar-filters-scroll" class="horizontal-scroll horizontal-scroll--bleed pb-2 mb-3">
                      <button type="button" class="h-8 px-4 rounded-full bg-white text-brand-600 font-medium text-[12px] flex items-center gap-1.5 shadow-sm">
                          <i class="fa-solid fa-shield-halved text-[11px]"></i> Mais Seguro
                      </button>
                      <button type="button" class="h-8 px-4 rounded-full glass-panel text-white font-medium text-[12px] flex items-center gap-1.5 hover:bg-white/10">
                          <i class="fa-solid fa-location-dot text-[11px]"></i> Distância
                      </button>
                      <button type="button" class="h-8 px-4 rounded-full glass-panel text-white font-medium text-[12px] flex items-center gap-1.5 hover:bg-white/10">
                          <i class="fa-solid fa-star text-[11px]"></i> Score Mínimo
                      </button>
                      <button type="button" class="h-8 px-4 rounded-full glass-panel text-white font-medium text-[12px] flex items-center gap-1.5 hover:bg-white/10">
                          <i class="fa-regular fa-clock text-[11px]"></i> Aberto Agora
                      </button>
                  </div>
                  
                  <div id="explorar-view-toggle" class="explorar-view-toggle" role="tablist" aria-label="Modo de visualização">
                      <button type="button" class="is-active" role="tab" aria-selected="true">
                          <i class="fa-solid fa-list-ul"></i> Lista
                      </button>
                      <button type="button" role="tab" aria-selected="false">
                          <i class="fa-regular fa-map"></i> Mapa
                      </button>
                  </div>
              </header>
      
              <div id="explorar-content" class="content pt-4 space-y-4">
                  
                  <div class="flex items-center justify-between mb-2">
                      <h2 class="text-[16px] font-semibold text-white">Resultados próximos</h2>
                  </div>
      
                  <!-- Location Card 1 -->
                  <article class="w-full glass-panel rounded-[24px] p-4 soft-shadow border border-white/10 relative overflow-hidden flex gap-4 items-center">
                      <div class="w-20 h-20 shrink-0 rounded-[16px] overflow-hidden relative">
                          <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/e03fcd6430-47c97714cdd32376edf6.png" alt="cozy cafe interior with plants and warm lighting" />
                          <div class="absolute top-1.5 right-1.5 bg-brand-600/80 backdrop-blur-sm px-1.5 py-0.5 rounded-full flex items-center gap-1 border border-white/20">
                              <i class="fa-solid fa-shield-halved text-[8px] text-brand-300"></i>
                              <span class="text-[10px] font-bold text-white">4.8</span>
                          </div>
                      </div>
                      
                      <div class="flex-1 min-w-0">
                          <h3 class="text-[15px] font-semibold text-white truncate mb-1">Café Botânico</h3>
                          <p class="text-[12px] text-white/60 flex items-center gap-1.5 mb-2 truncate">
                              <i class="fa-solid fa-mug-hot text-[10px]"></i> Café • 0.8 km
                          </p>
                          <div class="flex flex-wrap gap-1.5">
                              <span class="text-[10px] px-2 py-0.5 bg-brand-500/30 border border-brand-400/20 rounded-full text-brand-100 flex items-center gap-1">
                                  <i class="fa-solid fa-lightbulb"></i> Bem iluminado
                              </span>
                              <span class="text-[10px] px-2 py-0.5 bg-brand-500/30 border border-brand-400/20 rounded-full text-brand-100 flex items-center gap-1">
                                  <i class="fa-solid fa-users"></i> Movimentado
                              </span>
                          </div>
                      </div>
                      <button class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center shrink-0 hover:bg-white/20 transition-colors">
                          <i class="fa-regular fa-bookmark text-[14px] text-white"></i>
                      </button>
                  </article>
      
                  <!-- Location Card 2 -->
                  <article class="w-full glass-panel rounded-[24px] p-4 soft-shadow border border-white/10 relative overflow-hidden flex gap-4 items-center">
                      <div class="w-20 h-20 shrink-0 rounded-[16px] overflow-hidden relative">
                          <div class="w-full h-full bg-brand-500/20 flex items-center justify-center">
                              <i class="fa-solid fa-tree text-2xl text-brand-300"></i>
                          </div>
                          <div class="absolute top-1.5 right-1.5 bg-brand-600/80 backdrop-blur-sm px-1.5 py-0.5 rounded-full flex items-center gap-1 border border-white/20">
                              <i class="fa-solid fa-shield-halved text-[8px] text-brand-300"></i>
                              <span class="text-[10px] font-bold text-white">4.5</span>
                          </div>
                      </div>
                      
                      <div class="flex-1 min-w-0">
                          <h3 class="text-[15px] font-semibold text-white truncate mb-1">Praça do Sol</h3>
                          <p class="text-[12px] text-white/60 flex items-center gap-1.5 mb-2 truncate">
                              <i class="fa-solid fa-tree text-[10px]"></i> Parque • 1.2 km
                          </p>
                          <div class="flex flex-wrap gap-1.5">
                              <span class="text-[10px] px-2 py-0.5 bg-brand-500/30 border border-brand-400/20 rounded-full text-brand-100 flex items-center gap-1">
                                  <i class="fa-solid fa-person-military-pointing"></i> Policiamento
                              </span>
                          </div>
                      </div>
                      <button class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center shrink-0 hover:bg-white/20 transition-colors">
                          <i class="fa-regular fa-bookmark text-[14px] text-white"></i>
                      </button>
                  </article>
      
                  <!-- Location Card 3 -->
                  <article class="w-full glass-panel rounded-[24px] p-4 soft-shadow border border-white/10 relative overflow-hidden flex gap-4 items-center">
                      <div class="w-20 h-20 shrink-0 rounded-[16px] overflow-hidden relative">
                          <div class="w-full h-full bg-brand-500/20 flex items-center justify-center">
                              <i class="fa-solid fa-store text-2xl text-brand-300"></i>
                          </div>
                          <div class="absolute top-1.5 right-1.5 bg-brand-600/80 backdrop-blur-sm px-1.5 py-0.5 rounded-full flex items-center gap-1 border border-white/20">
                              <i class="fa-solid fa-shield-halved text-[8px] text-brand-300"></i>
                              <span class="text-[10px] font-bold text-white">4.2</span>
                          </div>
                      </div>
                      
                      <div class="flex-1 min-w-0">
                          <h3 class="text-[15px] font-semibold text-white truncate mb-1">Mercado Central</h3>
                          <p class="text-[12px] text-white/60 flex items-center gap-1.5 mb-2 truncate">
                              <i class="fa-solid fa-store text-[10px]"></i> Loja • 2.5 km
                          </p>
                          <div class="flex flex-wrap gap-1.5">
                              <span class="text-[10px] px-2 py-0.5 bg-brand-500/30 border border-brand-400/20 rounded-full text-brand-100 flex items-center gap-1">
                                  <i class="fa-solid fa-users"></i> Movimentado
                              </span>
                          </div>
                      </div>
                      <button class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center shrink-0 hover:bg-white/20 transition-colors">
                          <i class="fa-regular fa-bookmark text-[14px] text-white"></i>
                      </button>
                  </article>
      
              </div>
      
              <nav id="bottom-nav" class="bottom-nav" data-component="bottom-nav"></nav>
      
          </main>
      </div>
    </div>
    <div class="phone-home-indicator" aria-hidden="true"></div>
  </div>
  <script src="../js/storage.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/app-core.js"></script>
  <script src="../js/components/bottom-nav.js"></script>
  <script src="../js/pages/explorar.js"></script>
</body>
</html>
