<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avaliar - Step 5/7 - Fica Bem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="app-body" data-page="avaliacao-5">
  <div class="phone-device" aria-label="Simulador de aplicativo mobile">
    <div class="phone-notch" aria-hidden="true"></div>
    <div class="phone-screen">
      <div class="phone-screen-inner text-white h-full w-full flex flex-col relative overflow-hidden m-0 p-0">
      <!-- Background Elements -->
          <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
              <div class="absolute top-[-10%] left-[-20%] w-[140%] h-[60%] bg-gradient-to-b from-brand-500/40 to-transparent rounded-[100%] blur-3xl opacity-60"></div>
              <div class="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] bg-gradient-to-t from-brand-900/50 to-transparent rounded-[100%] blur-3xl opacity-80"></div>
          </div>
      
          <!-- Main Container (Mobile Constrained) -->
          <main id="auth-welcome" class="flex flex-col bg-[#2f6759]">
              
              <!-- Header with Progress Bar -->
              <header id="avaliar-header" class="w-full pt-12 pb-4 z-20 shrink-0 bg-[#2f6759]">
                  <div class="flex items-center justify-between mb-4">
                      <button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center hover:bg-white/20 transition-colors shadow-lg" aria-label="Voltar">
                          <i class="fa-solid fa-chevron-left text-[16px] text-white"></i>
                      </button>
                      <span class="text-[14px] font-semibold text-white tracking-wide">Passo 5 de 7</span>
                      <button class="text-[14px] font-medium text-brand-300 hover:text-brand-200 transition-colors" aria-label="Pular">
                          Pular
                      </button>
                  </div>
                  
                  <!-- Progress Bar -->
                  <div class="progress-bar-bg w-full">
                      <div class="progress-bar-fill" style="width: 71.42%;"></div>
                  </div>
              </header>
      
              <!-- Main Scrollable Content -->
              <div id="avaliar-content" class="content pt-4 space-y-8">
                  
                  <!-- Title Section -->
                  <div class="space-y-2">
                      <h1 class="text-[28px] font-bold text-white leading-tight">Fotos do local</h1>
                      <p class="text-[14px] text-white/70 leading-relaxed">
                          Adicione fotos do ambiente para ajudar outras mulheres a conhecerem o espaço.
                      </p>
                  </div>
      
                  <!-- Upload Photo Zone -->
                  <div class="space-y-4">
                      <button class="w-full h-[120px] dashed-upload bg-[#2f6759]/40 backdrop-blur-md flex flex-col items-center justify-center gap-3 hover:bg-white/5 transition-colors group">
                          <div class="w-12 h-12 rounded-full bg-brand-300/20 flex items-center justify-center group-hover:scale-105 transition-transform">
                              <i class="fa-solid fa-camera text-brand-300 text-[20px]"></i>
                          </div>
                          <span class="text-[14px] font-medium text-white/90">Adicionar foto</span>
                      </button>
                  </div>
      
                  <!-- Image Preview Grid -->
                  <div class="space-y-3">
                      <div class="flex items-center justify-between">
                          <h3 class="text-[15px] font-medium text-white">Fotos adicionadas (3)</h3>
                          <span class="text-[12px] text-white/50">Selecione uma capa</span>
                      </div>
                      
                      <div class="grid grid-cols-2 gap-3">
                          <!-- Selected Cover Image -->
                          <div class="relative rounded-[16px] overflow-hidden aspect-square border-2 border-brand-300 soft-shadow group cursor-pointer">
                              <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/04fc190f9c-80d329ec477e1eba9774.png" alt="A well-lit, cozy cafe interior with warm lighting and comfortable seating, safe environment for women, modern aesthetic" />
                              <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                              <div class="absolute top-2 right-2 w-6 h-6 bg-brand-300 rounded-full flex items-center justify-center shadow-md">
                                  <i class="fa-solid fa-star text-[10px] text-brand-900"></i>
                              </div>
                              <div class="absolute bottom-2 left-2 px-2 py-1 bg-black/40 backdrop-blur-sm rounded-md">
                                  <span class="text-[10px] font-medium text-white">Capa</span>
                              </div>
                              <button class="absolute top-2 left-2 w-6 h-6 bg-black/40 backdrop-blur-sm rounded-full flex items-center justify-center text-white/80 hover:text-white hover:bg-black/60 transition-colors">
                                  <i class="fa-solid fa-xmark text-[12px]"></i>
                              </button>
                          </div>
      
                          <!-- Regular Image -->
                          <div class="relative rounded-[16px] overflow-hidden aspect-square border border-white/10 soft-shadow group cursor-pointer hover:border-white/30 transition-colors">
                              <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/740fdc8490-e93194ec14adb3e709d6.png" alt="A bright, modern restroom in a commercial space, clean and safe, good lighting" />
                              <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
                              <button class="absolute top-2 left-2 w-6 h-6 bg-black/40 backdrop-blur-sm rounded-full flex items-center justify-center text-white/80 hover:text-white hover:bg-black/60 transition-colors">
                                  <i class="fa-solid fa-xmark text-[12px]"></i>
                              </button>
                          </div>
      
                          <!-- Regular Image -->
                          <div class="relative rounded-[16px] overflow-hidden aspect-square border border-white/10 soft-shadow group cursor-pointer hover:border-white/30 transition-colors">
                              <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/3f34be6e97-fccee523d16ef8e43ec6.png" alt="Exterior of a well-lit establishment at dusk, clear signage, safe street lighting" />
                              <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
                              <button class="absolute top-2 left-2 w-6 h-6 bg-black/40 backdrop-blur-sm rounded-full flex items-center justify-center text-white/80 hover:text-white hover:bg-black/60 transition-colors">
                                  <i class="fa-solid fa-xmark text-[12px]"></i>
                              </button>
                          </div>
                      </div>
                  </div>
      
                  <!-- Consent & Terms -->
                  <div class="pt-4 border-t border-white/10">
                      <label class="relative flex items-start gap-3 cursor-pointer group">
                          <div class="relative flex items-center justify-center shrink-0 mt-0.5">
                              <input type="checkbox" class="peer sr-only checkbox-custom">
                              <div class="w-5 h-5 rounded-[6px] border border-white/30 bg-white/5 flex items-center justify-center transition-all duration-200 peer-checked:bg-brand-300 peer-checked:border-brand-300 group-hover:border-white/50">
                                  <i class="fa-solid fa-check text-[12px] text-brand-900 opacity-0 transform scale-50 transition-all duration-200 icon-check"></i>
                              </div>
                          </div>
                          <p class="text-[13px] text-white/70 leading-relaxed">
                              Confirmo que as fotos são de minha autoria e autorizo o uso na plataforma Fica Bem, de acordo com os <a href="javascript:void(0)" class="text-white font-medium hover:text-brand-200 underline decoration-white/30 underline-offset-2 transition-colors">Termos de Uso</a>.
                          </p>
                      </label>
                  </div>
      
              <div class="avaliacao-actions w-full pt-4 pb-4">
                  <button class="w-full bg-brand-300 text-brand-900 font-semibold text-[15px] py-3.5 rounded-[16px] shadow-lg hover:bg-brand-200 transition-colors flex items-center justify-center gap-2">
                      Próximo <i class="fa-solid fa-arrow-right text-[14px]"></i>
                  </button>
              </div>
              </div>
      
              <nav id="bottom-nav" class="bottom-nav" data-component="bottom-nav"></nav>
      
          </main>
      </div>
    </div>
    <div class="phone-home-indicator" aria-hidden="true"></div>
  </div>
  <script src="../js/storage.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/app-core.js"></script>
  <script src="../js/pages/avaliacao-shared.js"></script>
  <script src="../js/components/bottom-nav.js"></script>
  <script src="../js/pages/avaliacao-5.js"></script>
</body>
</html>
